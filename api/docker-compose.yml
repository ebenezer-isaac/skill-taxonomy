services:
  neo4j:
    image: neo4j:5-community
    container_name: taxonomy-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/taxonomy_dev_password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p taxonomy_dev_password 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taxonomy-api
    ports:
      - "4000:4000"
    environment:
      - API_PORT=4000
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=taxonomy_dev_password
      - TAXONOMY_PATH=/app/data/skill-taxonomy.json
    volumes:
      - ../src/skill-taxonomy.json:/app/data/skill-taxonomy.json:ro
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
  neo4j_logs:
